<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawl Shop</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url('https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif');
    background-size:cover;
    background-position:center;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
}

.box{
    position:relative;
    z-index:2;
    width:350px;
    background:rgba(20,20,20,0.8);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding:20px;
    color:white;
    box-shadow:0 0 25px #ff00ff;
}

h1{
    text-align:center;
    color:#ff00ff;
}

.card{
    background:#111;
    border-radius:15px;
    padding:15px;
    margin-top:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#ff00ff,#6a00ff);
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="box">
<h1>🔥 Магазин Brawl Stars</h1>

<div class="card">
<h2>Аккаунт #1</h2>
<p>🏆 30000 кубков</p>
<p>💎 Много скинов</p>
<p>💰 Цена: 500 ₽</p>

<button onclick="buy()">Купить</button>
</div>

<div class="card">
<h2>Аккаунт #2</h2>
<p>🏆 50000 кубков</p>
<p>🌟 Редкие скины</p>
<p>💰 Цена: 1000 ₽</p>

<button onclick="buy()">Купить</button>
</div>

</div>

<script>
function buy(){
    window.open("https://t.me/lastlexore?text=Привет!+Я+хочу+купить+аккаунт", "_blank");
}
</script>

</body>
</html>
