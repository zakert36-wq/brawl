<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawl Shop</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.price{
    color:#22c55e;
    font-size:28px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🔥 Магазин аккаунтов Brawl Stars</h1>

<div class="products" id="products"></div>

<script>

async function loadProducts(){

    const res = await fetch('/products');

    const products = await res.json();

    const container = document.getElementById('products');

    container.innerHTML = '';

    products.reverse().forEach(product => {

        container.innerHTML += `
        
        <div class="card">

            <img src="${product.image}">

            <div class="info">

                <h2>${product.title}</h2>

                <p>${product.desc}</p>

                <div class="price">${product.price}₽</div>

                <br>

                <button onclick="window.location.href='https://t.me/lastlexore?text=Привет! Я хочу купить аккаунт'">
                Купить
                </button>

            </div>

        </div>

        `;
    });
}

loadProducts();

</script>

</body>
</html>
