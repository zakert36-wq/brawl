<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brawl Shop</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
      font-size:32px;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }

    .card{
      background:#1e293b;
      border-radius:20px;
      overflow:hidden;
      transition:0.2s;
      border:1px solid #334155;
    }

    .card:hover{
      transform:scale(1.02);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .info{
      padding:15px;
    }

    .title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .desc{
      color:#cbd5e1;
      margin-bottom:15px;
    }

    .price{
      font-size:28px;
      color:#22c55e;
      font-weight:bold;
      margin-bottom:15px;
    }

    .buy{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#3b82f6;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.2s;
    }

    .buy:hover{
      background:#2563eb;
    }
  </style>
</head>

<body>

  <h1>🔥 Магазин аккаунтов Brawl Stars</h1>

  <div class="products">

    <div class="card">
      <img src="https://wallpapercave.com/wp/wp7252578.jpg">

      <div class="info">
        <div class="title">Топ олд аккаунт</div>

        <div class="desc">
          100к кубков, редкие скины, много бравлеров
        </div>

        <div class="price">200₽</div>

        <button class="buy" onclick="buyProduct()">
          Купить
        </button>
      </div>
    </div>

  </div>

  <script>
    function buyProduct(){
      window.location.href = "https://t.me/shopbshalava_bot";
    }
  </script>

</body>
</html>
