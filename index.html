<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Brawl Shop</title>
<style>
body{
    background:#0b1220;
    color:white;
    font-family:Arial;
    padding:40px;
}
.card{
    background:#162033;
    border-radius:20px;
    padding:20px;
    max-width:400px;
}
img{
    width:100%;
    border-radius:15px;
}
.price{
    color:#00ff66;
    font-size:30px;
}
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-size:18px;
}
</style>
</head>
<body>

<h1>🔥 Магазин аккаунтов Brawl Stars</h1>

<div class="card">
<img src="https://placehold.co/600x300/png" alt="">
<h2>Топ олд аккаунт</h2>
<p>100 кубков, редкие скины</p>
<div class="price">200₽</div>
<br>
<button>Купить</button>
</div>

</body>
</html>
