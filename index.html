<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawl Stars Account</title>
<style>
body{
background:#071226;
font-family:Arial;
margin:0;
padding:40px;
color:white;
}

.container{
max-width:1400px;
margin:auto;
}

.card{
background:#111d35;
border-radius:30px;
padding:30px;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.title{
font-size:42px;
font-weight:bold;
margin-bottom:10px;
}

.price{
font-size:50px;
font-weight:bold;
margin:20px 0;
background:linear-gradient(90deg,#00ff99,#00ccff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.buy-btn{
display:inline-block;
padding:18px 40px;
border-radius:16px;
background:linear-gradient(90deg,#5865F2,#00c3ff);
color:white;
font-size:22px;
font-weight:bold;
text-decoration:none;
transition:0.3s;
}

.buy-btn:hover{
transform:scale(1.05);
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-top:30px;
}

.stat{
background:#1a2745;
padding:20px;
border-radius:18px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin-top:40px;
}

.gallery img{
width:100%;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,0.4);
}
</style>
</head>
<body>
<div class="container">
<div class="card">
<div class="title">🖤 АКАУНТ БРАВЛ 2020 ГОДА ♠️</div>

<div class="price">200₽</div>

<a class="buy-btn" href="https://t.me/lastlexore" target="_blank">Купить</a>

<div class="stats">
<div class="stat"><b>Количество бойцов</b><br>99</div>
<div class="stat"><b>Рекорд трофеев</b><br>52209</div>
<div class="stat"><b>Легендарные персонажи</b><br>13</div>
<div class="stat"><b>Высший ранг</b><br>Алмазная лига</div>
<div class="stat"><b>Престиж</b><br>Есть</div>
<div class="stat"><b>Бесплатная смена ника</b><br>Нет</div>
</div>

<p style="margin-top:30px;font-size:20px;">
САМЫЙ СОЧНЫЙ АККАУНТ С ПОЧТИ ВСЕМИ СТАРЫМИ БРАВЛ ПАССАМИ И КУЧЕЙ РЕДКИХ СКИНОВ.
</p>

<div class="gallery">
<img src="images/photo1.jpg"><img src="images/photo2.jpg"><img src="images/photo3.jpg"><img src="images/photo4.jpg"><img src="images/photo5.jpg"><img src="images/photo6.jpg"><img src="images/photo7.jpg"><img src="images/photo8.jpg"><img src="images/photo9.jpg"><img src="images/photo10.jpg">
</div>

</div>
</div>
</body>
</html>
