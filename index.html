<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brawl Shop</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.admin{
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    margin-bottom:30px;
}

input{
    width:100%;
    margin-bottom:10px;
    padding:12px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-size:18px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.price{
    color:#22c55e;
    font-size:28px;
    font-weight:bold;
}

</style>
</head>
<body>

<h1>🔥 Магазин аккаунтов Brawl Stars</h1>

<div class="admin">

<input type="text" id="title" placeholder="Название">

<input type="text" id="desc" placeholder="Описание">

<input type="number" id="price" placeholder="Цена">

<input type="file" id="image">

<button onclick="addProduct()">
Добавить товар
</button>

</div>

<div class="products" id="products"></div>

<script>

let products = JSON.parse(localStorage.getItem('products')) || [];

function saveProducts(){
    localStorage.setItem('products', JSON.stringify(products));
}

function renderProducts(){

    const container = document.getElementById('products');

    container.innerHTML = '';

    products.forEach(product => {

        container.innerHTML += `
        
        <div class="card">

            <img src="${product.image}">

            <div class="info">

                <h2>${product.title}</h2>

                <p>${product.desc}</p>

                <div class="price">${product.price}₽</div>

                <br>

                <button onclick="window.location.href='https://t.me/shopbshalava_bot'">
                Купить
                </button>

            </div>

        </div>

        `;
    });
}

function addProduct(){

    const title = document.getElementById('title').value;
    const desc = document.getElementById('desc').value;
    const price = document.getElementById('price').value;

    const file = document.getElementById('image').files[0];

    const reader = new FileReader();

    reader.onload = function(e){

        const product = {
            title,
            desc,
            price,
            image:e.target.result
        };

        products.push(product);

        saveProducts();

        renderProducts();

    };

    reader.readAsDataURL(file);
}

renderProducts();

</script>

</body>
</html>
