<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawl Shop</title>

<style>
body{
margin:0;
font-family:Arial;
background:url('https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExdTg5dTZ5N3B3Z3l0aHpkM2N1dW1qYjJydWJxZnR1eGN0M2w3cTZ6biZlcD12MV9naWZzX3NlYXJjaCZjdD1n/3o7aD2saalBwwftBIY/giphy.gif');
background-size:cover;
background-position:center;
color:white;
}

.overlay{
min-height:100vh;
background:rgba(0,0,0,0.7);
padding:20px;
}

.container{
max-width:400px;
margin:auto;
}

.card{
background:#111;
border-radius:20px;
padding:15px;
margin-bottom:20px;
box-shadow:0 0 20px #ff00ff;
}

img{
width:100%;
border-radius:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#ff00ff,#6a00ff);
color:white;
font-size:18px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="overlay">
<div class="container" id="products"></div>
</div>

<script>
fetch('/products')
.then(r=>r.json())
.then(data=>{

const container=document.getElementById("products");

data.reverse().forEach(item=>{

container.innerHTML += `
<div class="card">

<img src="${item.photo}">

<h2>${item.title}</h2>

<p>${item.description}</p>

<p>💰 Цена: ${item.price} ₽</p>

<a href="https://t.me/lastlexore?text=Привет! Я хочу купить аккаунт">
<button>Купить</button>
</a>

</div>
`;

});

});
</script>

</body>
</html>
